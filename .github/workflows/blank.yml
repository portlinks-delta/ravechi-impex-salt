name: Deploy to Server

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SSH_PORT }}   # use secret here

        script: |
          cd /home/pli/sri/frontend
          pwd
          ls -la
          git pull origin main
          git log -1
          rm -rf .next
          npm ci
          npm run build
          sudo systemctl restart sri.admin.service
